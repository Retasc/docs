<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Retasc favicon: queue fan-out. One source (the queue) dispatches to three
       workers. Transparent background; colors adapt to the browser theme. -->
  <style>
    .e { stroke: #8a8a8a; } .n { fill: #1a1a1a; }
    @media (prefers-color-scheme: dark) { .e { stroke: #5a5a5a; } .n { fill: #f0f0f0; } }
  </style>
  <line class="e" x1="8" y1="16" x2="24" y2="7"  stroke-width="1.5"/>
  <line class="e" x1="8" y1="16" x2="24" y2="16" stroke-width="1.5"/>
  <line class="e" x1="8" y1="16" x2="24" y2="25" stroke-width="1.5"/>
  <circle class="n" cx="24" cy="7"  r="2.5"/>
  <circle class="n" cx="24" cy="16" r="2.5"/>
  <circle class="n" cx="24" cy="25" r="2.5"/>
  <circle class="n" cx="8" cy="16" r="3.5"/>
</svg>
